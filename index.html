<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống Lọc Chi tiết Cây xanh T9</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root { --primary: #1b5e20; --bg: #f8fafc; --text: #334155; --accent: #2e7d32; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); margin: 0; padding: 15px; color: var(--text); }
        .container { max-width: 100%; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        
        header { text-align: center; border-bottom: 2px solid #e2e8f0; margin-bottom: 20px; padding-bottom: 10px; }
        header h1 { color: var(--primary); margin: 0; font-size: 22px; text-transform: uppercase; }

        /* Trạng thái kết nối */
        .status-badge { display: inline-block; padding: 6px 12px; border-radius: 20px; font-size: 13px; margin-bottom: 15px; font-weight: bold; }
        .loading { background: #fff3e0; color: #ef6c00; }
        .ready { background: #e8f5e9; color: #2e7d32; }

        /* Khu vực tìm kiếm 4 ô */
        .filter-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); 
            gap: 15px; 
            background: #f1f5f9; 
            padding: 20px; 
            border-radius: 10px; 
            margin-bottom: 20px; 
            align-items: flex-end;
        }
        .filter-group { display: flex; flex-direction: column; gap: 8px; }
        .filter-group label { font-weight: bold; font-size: 13px; color: var(--primary); }
        input { padding: 10px; border: 1px solid #cbd5e0; border-radius: 6px; outline: none; font-size: 14px; }
        input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(46,125, 50, 0.1); }

        .btn-group { display: flex; gap: 10px; margin-top: 10px; }
        button { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-search { background: var(--primary); color: white; flex: 2; }
        .btn-reset { background: #64748b; color: white; flex: 1; }
        button:hover { opacity: 0.9; transform: translateY(-1px); }
        button:disabled { background: #ccc; cursor: not-allowed; }

        /* Bảng hiển thị */
        .table-resizer { overflow-x: auto; max-height: 600px; border: 1px solid #e2e8f0; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; min-width: 2500px; }
        th { background: var(--primary); color: white; position: sticky; top: 0; padding: 12px; font-size: 13px; text-align: left; z-index: 10; }
        td { padding: 10px; border-bottom: 1px solid #edf2f7; font-size: 13px; }
        tr:nth-child(even) { background: #f8fafc; }
        tr:hover { background: #f1f8e9; }
        .highlight { background: #fef08a; font-weight: bold; }
        
        .result-info { margin-bottom: 10px; font-size: 14px; color: #64748b; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Hệ Thống Tra Cứu Chi Tiết Cây Xanh T9</h1>
    </header>

    <div id="status" class="status-badge loading">🔄 Đang tải dữ liệu trực tuyến (47k dòng)...</div>

    <div class="filter-grid">
        <div class="filter-group">
            <label>1. Chọn Phường</label>
            <input type="text" id="filterPhuong" placeholder="Nhập tên phường...">
        </div>
        <div class="filter-group">
            <label>2. Chọn Đường</label>
            <input type="text" id="filterDuong" placeholder="Nhập tên đường...">
        </div>
        <div class="filter-group">
            <label>3. Chọn Tên cây</label>
            <input type="text" id="filterLoai" placeholder="Nhập loài cây...">
        </div>
        <div class="filter-group">
            <label>4. Chọn Số cây</label>
            <input type="text" id="filterSoHieu" placeholder="Nhập số cây/số hiệu...">
        </div>
        <div class="btn-group">
            <button id="searchBtn" class="btn-search" onclick="performFilter()" disabled>TÌM KIẾM</button>
            <button class="btn-reset" onclick="resetFilters()">LÀM MỚI</button>
        </div>
    </div>

    <div id="resultInfo" class="result-info">Đang đợi nạp dữ liệu...</div>

    <div class="table-resizer">
        <table id="mainTable">
            <thead id="tableHead"></thead>
            <tbody id="tableBody">
                <tr><td colspan="22" style="text-align:center; padding:100px;">Vui lòng chờ tải dữ liệu từ máy chủ Google...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    const DATA_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQiHzB1J4YZQeBZt-LpVGJDwdOwauzcxklhhNzOTgmxUsiKR_zdpr6qs28yLUnAG_MfWAshhe3eFG9W/pub?gid=195844642&single=true&output=csv';

    let db = [];
    let headers = [];

    // Tự động tải dữ liệu
    window.onload = function() {
        Papa.parse(DATA_URL, {
            download: true,
            skipEmptyLines: true,
            complete: function(results) {
                db = results.data;
                headers = db[0];
                
                // Khởi tạo giao diện
                document.getElementById('tableHead').innerHTML = `<tr>${headers.map(h => `<th>${h}</th>`).join('')}</tr>`;
                document.getElementById('status').innerText = `✅ Dữ liệu sẵn sàng: ${(db.length - 1).toLocaleString()} dòng`;
                document.getElementById('status').className = 'status-badge ready';
                document.getElementById('searchBtn').disabled = false;
                document.getElementById('resultInfo').innerText = "Mời bạn nhập tiêu chí tra cứu.";
                
                renderTable(db.slice(1, 31)); // Hiển thị 30 dòng đầu
            },
            error: function() {
                document.getElementById('status').innerText = "❌ Lỗi kết nối Google Sheets!";
                document.getElementById('status').className = 'status-badge loading';
            }
        });
    };

    function performFilter() {
        const valPhuong = document.getElementById('filterPhuong').value.toLowerCase().trim();
        const valDuong = document.getElementById('filterDuong').value.toLowerCase().trim();
        const valLoai = document.getElementById('filterLoai').value.toLowerCase().trim();
        const valSoHieu = document.getElementById('filterSoHieu').value.toLowerCase().trim();

        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = `<tr><td colspan="${headers.length}" style="text-align:center; padding:50px;">🔍 Đang lọc dữ liệu...</td></tr>`;

        // Chỉ số cột thực tế trong file Excel của bạn:
        // Cột 6: Phường | Cột 8: Tên đường | Cột 10: Loài cây | Cột 11: Số cây
        const filtered = db.slice(1).filter(row => {
            const matchPhuong = valPhuong === "" || (row[6] && row[6].toLowerCase().includes(valPhuong));
            const matchDuong = valDuong === "" || (row[8] && row[8].toLowerCase().includes(valDuong));
            const matchLoai = valLoai === "" || (row[10] && row[10].toLowerCase().includes(valLoai));
            const matchSoHieu = valSoHieu === "" || (row[11] && row[11].toLowerCase().includes(valSoHieu));
            
            return matchPhuong && matchDuong && matchLoai && matchSoHieu;
        });

        document.getElementById('resultInfo').innerText = `Tìm thấy ${filtered.length.toLocaleString()} kết quả phù hợp.`;
        renderTable(filtered);
    }

    function renderTable(data) {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = "";

        if (data.length === 0) {
            tbody.innerHTML = `<tr><td colspan="${headers.length}" style="text-align:center; padding:50px; color:red; font-weight:bold;">❌ Không có dữ liệu khớp với bộ lọc.</td></tr>`;
            return;
        }

        const limit = 500;
        data.slice(0, limit).forEach(row => {
            const tr = document.createElement('tr');
            row.forEach(cell => {
                const td = document.createElement('td');
                td.innerText = cell || "";
                tr.appendChild(td);
            });
            tbody.appendChild(tr);
        });

        if (data.length > limit) {
            const tr = document.createElement('tr');
            tr.innerHTML = `<td colspan="${headers.length}" style="text-align:center; background:#fff3e0; padding:15px; font-weight:bold;">⚠️ Chỉ hiển thị 500 / ${data.length.toLocaleString()} dòng. Hãy lọc chi tiết hơn để thấy kết quả mong muốn.</td>`;
            tbody.appendChild(tr);
        }
    }

    function resetFilters() {
        document.getElementById('filterPhuong').value = "";
        document.getElementById('filterDuong').value = "";
        document.getElementById('filterLoai').value = "";
        document.getElementById('filterSoHieu').value = "";
        document.getElementById('resultInfo').innerText = "Đã làm mới bộ lọc.";
        renderTable(db.slice(1, 31));
    }
</script>

</body>
</html>
